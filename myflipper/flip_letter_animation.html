<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Letter Demo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #1b1b1b;
    }

    .flip-letter-host {
      width: 90px;
      height: 120px;
      perspective: 900px;
      display: inline-block;
      position: relative;
    }

    .flip-letter {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      background: #111;
      box-shadow:
        0 10px 25px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .flip-part {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-size: 72px;
      font-weight: 700;
      color: #f5f5f5;
      background: linear-gradient(to bottom, #2a2a2a, #101010);
      backface-visibility: hidden;
      overflow: hidden;
    }

    .flip-part.top {
      top: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    .flip-part.bottom {
      bottom: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
    }

    .flip-part.flip {
      z-index: 3;
      transform-style: preserve-3d;
    }

    .flip-part.top-flip {
      top: 0;
      transform-origin: bottom;
    }

    .flip-part.bottom-flip {
      bottom: 0;
      transform-origin: top;
      transform: rotateX(90deg);
    }

    .flip-part.rotate-out {
      animation: flipTopOut 180ms ease-in forwards;
    }

    .flip-part.rotate-in {
      animation: flipBottomIn 180ms ease-out forwards;
    }

    @keyframes flipTopOut {
      from { transform: rotateX(0deg); }
      to { transform: rotateX(-90deg); }
    }

    @keyframes flipBottomIn {
      from { transform: rotateX(90deg); }
      to { transform: rotateX(0deg); }
    }
  </style>
</head>
<body>
  <div id="flip-letter" class="flip-letter-host"></div>

  <script>
    class FlipLetter {
      constructor(container, options = {}) {
        this.container = container;
        this.current = " ";
        this.animating = false;
        this.chars = options.chars || "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!?.,:-+/";
        this.flipCount = options.flipCount || 8;
        this.flipDelay = options.flipDelay || 45;
        this._build();
      }

      _build() {
        this.container.classList.add("flip-letter");
        this.top = document.createElement("div");
        this.top.className = "flip-part top";
        this.top.textContent = this.current;

        this.bottom = document.createElement("div");
        this.bottom.className = "flip-part bottom";
        this.bottom.textContent = this.current;

        this.topFlip = document.createElement("div");
        this.topFlip.className = "flip-part flip top-flip";
        this.topFlip.textContent = this.current;

        this.bottomFlip = document.createElement("div");
        this.bottomFlip.className = "flip-part flip bottom-flip";
        this.bottomFlip.textContent = this.current;

        this.container.appendChild(this.top);
        this.container.appendChild(this.bottom);
        this.container.appendChild(this.topFlip);
        this.container.appendChild(this.bottomFlip);
      }

      _randomChar() {
        return this.chars[Math.floor(Math.random() * this.chars.length)];
      }

      setChar(char) {
        const next = String(char).toUpperCase().slice(0, 1) || " ";
        if (next === this.current || this.animating) return;

        this.animating = true;
        let step = 0;
        const startChar = this.current;

        const tick = () => {
          if (step < this.flipCount) {
            const scramble = this._randomChar();
            this.top.textContent = startChar;
            this.bottom.textContent = scramble;
            this.topFlip.textContent = startChar;
            this.bottomFlip.textContent = scramble;

            this.topFlip.classList.remove("rotate-out");
            this.bottomFlip.classList.remove("rotate-in");
            void this.topFlip.offsetWidth;
            this.topFlip.classList.add("rotate-out");
            this.bottomFlip.classList.add("rotate-in");

            step++;
            setTimeout(tick, this.flipDelay);
          } else {
            this.current = next;
            this.top.textContent = next;
            this.bottom.textContent = next;
            this.topFlip.textContent = next;
            this.bottomFlip.textContent = next;
            this.topFlip.classList.remove("rotate-out");
            this.bottomFlip.classList.remove("rotate-in");
            this.animating = false;
          }
        };

        tick();
      }
    }

    const flip = new FlipLetter(document.getElementById("flip-letter"));
    flip.setChar("A");
    setTimeout(() => flip.setChar("B"), 1000);
    setTimeout(() => flip.setChar("Z"), 2000);
  </script>
</body>
</html>
