<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Letter Grid</title>
    <link rel="stylesheet" href="flipper.css">
    <link rel="stylesheet" href="grid.css">
    <link rel="stylesheet" href="grid-inputs.css">
</head>
<body>
<div class="page-frame">
<div class="scaling-container">
    <div id="grid"></div>
</div>

<div class="inputs-container">
    <div id="input-grid"></div>
</div>

<div class="controls">
    <label for="grid-input"></label><input type="text" id="grid-input" maxlength="100" placeholder="TYPE SOMETHING...">
    <button id="set-text-btn">SEND TO GRID</button>
    <button id="flip-grid-btn">UPDATE GRID</button>
    <button id="clear-btn">CLEAR</button>
</div>
</div>
<script src="FlipLetterAnimation.js"></script>
<script src="grid.js"></script>

</body>
</html>
