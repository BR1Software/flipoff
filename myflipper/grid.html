<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Letter Grid</title>
    <link rel="stylesheet" href="myflipper.css">
    <style>
        :root {
            --grid-cols: 10;
            --grid-rows: 5;
            --flip-width: 96px;
            --flip-height: 128px;
            --gap: 10px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        .scaling-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--flip-width));
            grid-template-rows: repeat(var(--grid-rows), var(--flip-height));
            gap: var(--gap);
            transform-origin: center;
            transition: transform 0.1s ease-out;
            background: #000;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .controls {
            padding: 20px;
            background: #333;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        input {
            width: 300px;
            padding: 10px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            text-transform: uppercase;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 5px;
            border: none;
            background: #555;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #777;
        }

        /* Adjust individual flip-letter-host for the grid */
        .flip-letter-host {
            margin: 0; /* Clear any default margins */
        }
    </style>
</head>
<body>

<div class="scaling-container">
    <div id="grid"></div>
</div>

<div class="controls">
    <input type="text" id="grid-input" maxlength="50" placeholder="TYPE SOMETHING...">
    <button id="set-text-btn">FLIP ALL</button>
    <button id="clear-btn">CLEAR</button>
</div>

<script src="FlipLetterAnimation.js"></script>
<script>
    const COLS = 10;
    const ROWS = 5;
    const TOTAL_CELLS = COLS * ROWS;
    const gridElement = document.getElementById('grid');
    const flippers = [];

    // Initialize grid
    for (let i = 0; i < TOTAL_CELLS; i++) {
        const host = document.createElement('div');
        host.className = 'flip-letter-host';
        gridElement.appendChild(host);
        
        const flip = new FlipLetter(host, {
            flipDelay: 100 + (Math.random() * 50) // Slight variance for more organic feel
        });
        flippers.push(flip);
    }

    // Scaling logic
    function resizeGrid() {
        const container = document.querySelector('.scaling-container');
        const containerWidth = container.clientWidth - 40;
        const containerHeight = container.clientHeight - 40;
        
        // Original size of the grid including padding and gaps
        // CSS vars: 10 * 96px + 9 * 10px + 40px padding = 960 + 90 + 40 = 1090
        // CSS vars: 5 * 128px + 4 * 10px + 40px padding = 640 + 40 + 40 = 720
        const originalWidth = (COLS * 96) + ((COLS - 1) * 10) + 40;
        const originalHeight = (ROWS * 128) + ((ROWS - 1) * 10) + 40;

        const scaleX = containerWidth / originalWidth;
        const scaleY = containerHeight / originalHeight;
        const scale = Math.min(scaleX, scaleY, 1); // Don't scale up past 1:1

        gridElement.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', resizeGrid);
    resizeGrid();

    // Controls
    const input = document.getElementById('grid-input');
    const btn = document.getElementById('set-text-btn');
    const clearBtn = document.getElementById('clear-btn');

    function setText(text) {
        text = text.toUpperCase().padEnd(TOTAL_CELLS, ' ');
        for (let i = 0; i < TOTAL_CELLS; i++) {
            // Delay each letter slightly for a wave effect
            setTimeout(() => {
                flippers[i].setChar(text[i]);
            }, i * 20);
        }
    }

    btn.addEventListener('click', () => {
        setText(input.value);
    });

    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            setText(input.value);
        }
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        setText('');
    });
</script>

</body>
</html>
